<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 70" width="180" height="70">
  <rect width="180" height="70" fill="#ffffff" rx="5" stroke="#e0e0e0" stroke-width="1"/>
  <!-- EU blue stripe top -->
  <rect x="0" y="0" width="180" height="8" fill="#003399" rx="5"/>
  <rect x="0" y="0" width="180" height="4" fill="#003399"/>
  <!-- EU stars row -->
  <text x="90" y="13" font-family="Arial, sans-serif" font-size="7" fill="#FFCC00" text-anchor="middle" letter-spacing="3">★ ★ ★ ★ ★ ★ ★</text>
  <!-- JRC text -->
  <text x="50" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#003399" text-anchor="middle" letter-spacing="1">JRC</text>
  <!-- Divider -->
  <rect x="90" y="20" width="1.5" height="38" fill="#cccccc"/>
  <!-- ERM text -->
  <text x="132" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#1A1A1A" text-anchor="middle">ERM</text>
  <text x="132" y="50" font-family="Arial, sans-serif" font-size="7.5" fill="#555555" text-anchor="middle">Reference Materials</text>
  <!-- Blue stripe bottom -->
  <rect x="0" y="62" width="180" height="8" fill="#003399" rx="5"/>
  <rect x="0" y="62" width="180" height="4" fill="#003399"/>
</svg>
